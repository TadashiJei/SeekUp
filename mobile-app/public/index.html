<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#4CAF50" />
    <meta
      name="description"
      content="SEEKUP - Connect volunteers with organizations"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <title>SEEKUP</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Roboto', sans-serif;
        overscroll-behavior-y: contain;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .page-content {
        flex: 1;
        padding: 16px;
        padding-bottom: 72px; /* Space for bottom navigation */
      }
      .bottom-navigation {
        position: fixed;
        bottom: 0;
        width: 100%;
        z-index: 1000;
      }
      /* Splash screen styles */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #4CAF50;
        color: white;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Splash screen shown before React loads -->
      <div class="splash-screen">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12,2L1,12h3v8h6v-6h4v6h6v-8h3L12,2z M12,5c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,5,12,5z"/>
          </svg>
        </div>
        <h1>SEEKUP</h1>
        <p>Connect. Volunteer. Grow.</p>
      </div>
    </div>
    <script>
      // Hide splash screen when app is loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          const splash = document.querySelector('.splash-screen');
          if (splash) {
            splash.style.opacity = 0;
            setTimeout(function() {
              splash.style.display = 'none';
            }, 500);
          }
        }, 1000);
      });
      
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js').then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
